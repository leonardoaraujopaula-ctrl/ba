<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Battle Royale 2D</title>
<style>
    body {
        margin: 0;
        background: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
    }
    canvas {
        border: 4px solid #fff;
        background: #0a1f0a;
    }
    #ui {
        position: absolute;
        top: 15px;
        left: 15px;
        color: white;
        font-size: 18px;
        background: rgba(0,0,0,0.7);
        padding: 10px 15px;
        border-radius: 8px;
    }
</style>
</head>
<body>

<canvas id="game" width="1000" height="700"></canvas>

<div id="ui">
    Vida: <span id="health">100</span><br>
    Jogadores: <span id="players">11</span><br>
    Zona: <span id="zone">800</span>
</div>

<div id="error" style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:red; display:none;">
    Erro no jogo. Abra o console (F12)
</div>

<script>
// ==================== BATTLE ROYALE - VERSÃO DEBUG ====================

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const healthEl = document.getElementById("health");
const playersEl = document.getElementById("players");
const zoneEl = document.getElementById("zone");

let player = { x: 500, y: 350, size: 13, speed: 5.5, health: 100, angle: 0 };
let bullets = [];
let bots = [];
let particles = [];
let safeRadius = 800;
let timeUntilShrink = 8000;
let gameRunning = true;
const keys = {};

// Criar bots
for (let i = 0; i < 10; i++) {
    bots.push({
        x: Math.random() * 880 + 60,
        y: Math.random() * 580 + 60,
        size: 12,
        speed: 2.9,
        health: 85,
        color: "#ff4444"
    });
}

// Controles
window.addEventListener("keydown", e => keys[e.key] = true);
window.addEventListener("keyup", e => keys[e.key] = false);

canvas.addEventListener("mousemove", (e) => {
    const rect = canvas.getBoundingClientRect();
    player.angle = Math.atan2(e.clientY - rect.top - player.y, e.clientX - rect.left - player.x);
});

canvas.addEventListener("click", () => {
    if (!gameRunning) return;
    bullets.push({
        x: player.x,
        y: player.y,
        speed: 13,
        angle: player.angle,
        damage: 28
    });
});

function update() {
    if (!gameRunning) return;

    if (keys['w'] || keys['W']) player.y -= player.speed;
    if (keys['s'] || keys['S']) player.y += player.speed;
    if (keys['a'] || keys['A']) player.x -= player.speed;
    if (keys['d'] || keys['D']) player.x += player.speed;

    player.x = Math.max(25, Math.min(975, player.x));
    player.y = Math.max(25, Math.min(675, player.y));

    // Balas
    for (let i = bullets.length - 1; i >= 0; i--) {
        let b = bullets[i];
        b.x += Math.cos(b.angle) * b.speed;
        b.y += Math.sin(b.angle) * b.speed;
        if (b.x < 0 || b.x > 1000 || b.y < 0 || b.y > 700) bullets.splice(i, 1);
    }

    // Bots
    bots.forEach(bot => {
        if (bot.health <= 0) return;
        const dx = player.x - bot.x;
        const dy = player.y - bot.y;
        const dist = Math.hypot(dx, dy);
        if (dist > 0) {
            bot.x += (dx / dist) * bot.speed;
            bot.y += (dy / dist) * bot.speed;
        }
    });

    bots = bots.filter(bot => bot.health > 0);

    if (timeUntilShrink > 0) timeUntilShrink -= 16;
    else if (safeRadius > 130) safeRadius -= 0.85;

    const distFromCenter = Math.hypot(player.x - 500, player.y - 350);
    if (distFromCenter > safeRadius) player.health -= 0.2;

    healthEl.textContent = Math.max(0, Math.floor(player.health));
    playersEl.textContent = bots.length + 1;
    zoneEl.textContent = Math.floor(safeRadius);

    if (player.health <= 0) gameRunning = false;
}

function draw() {
    ctx.fillStyle = "#0a1f0a";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#1e3a1e";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Zona
    ctx.strokeStyle = "#ff0000";
    ctx.lineWidth = 7;
    ctx.beginPath();
    ctx.arc(500, 350, safeRadius, 0, Math.PI * 2);
    ctx.stroke();

    // Bots
    bots.forEach(bot => {
        ctx.fillStyle = bot.color;
        ctx.beginPath();
        ctx.arc(bot.x, bot.y, bot.size, 0, Math.PI * 2);
        ctx.fill();
    });

    // Jogador
    ctx.save();
    ctx.translate(player.x, player.y);
    ctx.rotate(player.angle);
    ctx.fillStyle = "#00aaff";
    ctx.beginPath();
    ctx.arc(0, 0, player.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "#005588";
    ctx.fillRect(10, -5, 22, 10);
    ctx.restore();

    // Balas
    ctx.fillStyle = "#ffff00";
    bullets.forEach(b => {
        ctx.beginPath();
        ctx.arc(b.x, b.y, 4.5, 0, Math.PI * 2);
        ctx.fill();
    });
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

// Iniciar o jogo
try {
    gameLoop();
    console.log("✅ Jogo iniciado com sucesso!");
} catch (e) {
    console.error("Erro ao iniciar o jogo:", e);
    document.getElementById("error").style.display = "block";
}
</script>
</body>
</html>
